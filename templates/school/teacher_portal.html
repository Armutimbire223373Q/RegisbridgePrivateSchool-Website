{% extends 'base.html' %}
{% load static %}

{% block title %}Teacher Portal - Regisbridge Private School{% endblock %}

{% block content %}
<div class="container py-5">
    <h1>Teacher Portal</h1>
    <p>Welcome to your teacher portal.</p>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .class-info {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
    }
    
    .class-stats {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
    }
    
    .progress {
        height: 10px;
    }
    
    .list-group-item {
        border-left: none;
        border-right: none;
    }
    
    .list-group-item:first-child {
        border-top: none;
    }
    
    .list-group-item:last-child {
        border-bottom: none;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
    
    .lesson-card {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
        height: 100%;
    }
</style>
{% endblock %}
