{% extends "base.html" %}

{% block title %}{{ error_title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-1 text-danger">{{ error_code }}</h1>
            <h2 class="mb-4">{{ error_title }}</h2>
            <p class="lead">{{ error_message }}</p>
            <div class="mt-4">
                <a href="{% url 'main:home' %}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Return to Home
                </a>
                <a href="{% url 'main:contact' %}" class="btn btn-outline-primary ms-2">
                    <i class="fas fa-envelope"></i> Contact Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
